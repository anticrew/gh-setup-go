name: setup-go.yml
on:
  workflow_call:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Set up cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go
          restore-keys: |
            ${{ runner.os }}-go

      - name: Disable go proxy
        run:
          go env -w GOPROXY=direct
          go env -w GOPRIVATE=github.com/anticrew/*

      - name: Download dependencies
        run:
          go mod download

      - name: Build go
        run:
          go build -v ./...